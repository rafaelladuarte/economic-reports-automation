# ============================================================
# docker-compose.yml — Economic Reports Automation
# Airflow 3.x com LocalExecutor + PostgreSQL
# Baseado no docker-compose oficial do Apache Airflow 3
# ============================================================

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  image: economic-reports-airflow:3.1.7

  env_file:
    - .env

  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    # Airflow 3.x requer a definição explícita do auth manager
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    # URL de comunicação entre scheduler/worker e o api-server (novo no Airflow 3)
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    # Habilita health check HTTP no scheduler (porta 8974)
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # Arquivo de configuração centralizado
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
    # PYTHONPATH para importar 'src.*' nas DAGs
    PYTHONPATH: /opt/airflow

  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./plugins:/opt/airflow/plugins
    - ./config:/opt/airflow/config
    - airflow-logs:/opt/airflow/logs

  user: "${AIRFLOW_UID:-50000}:0"

  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy


services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        if [[ -z "${AIRFLOW_UID}" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: AIRFLOW_UID not set!\e[0m"
          echo "Se você está no Linux, defina a variável AIRFLOW_UID no arquivo .env:"
          echo "    echo -e \"AIRFLOW_UID=$(id -u)\" >> .env"
          echo
          export AIRFLOW_UID=$$(id -u)
        fi
        one_meg=1048576
        mem_available=$$(($$(getconf _PHYS_PAGES) * $$(getconf PAGE_SIZE) / one_meg))
        cpus_available=$$(grep -cE 'cpu[0-9]+' /proc/stat)
        disk_available=$$(df / | tail -1 | awk '{print $$4}')
        warning_resources="false"
        if (( mem_available < 4000 )) ; then
          echo
          echo -e "\033[1;33mWARNING!!!: Memória insuficiente para o Docker.\e[0m"
          echo "Mínimo recomendado: 4GB. Disponível: $$(numfmt --to iec $$((mem_available * one_meg)))"
          echo
          warning_resources="true"
        fi
        if (( cpus_available < 2 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: CPUs insuficientes para o Docker.\e[0m"
          echo "Mínimo recomendado: 2 CPUs. Disponível: $${cpus_available}"
          echo
          warning_resources="true"
        fi
        if (( disk_available < one_meg * 10 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Espaço em disco insuficiente.\e[0m"
          echo "Mínimo recomendado: 10 GB. Disponível: $$(numfmt --to iec $$((disk_available * 1024)))"
          echo
          warning_resources="true"
        fi
        if [[ $${warning_resources} == "true" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: Recursos insuficientes para rodar o Airflow (veja acima).\e[0m"
          echo
        fi
        echo "Criando diretórios necessários em /opt/airflow..."
        mkdir -v -p /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Versão do Airflow:"
        /entrypoint airflow version
        echo
        echo "Gerando arquivo de configuração padrão (se ausente)..."
        /entrypoint airflow config list > /dev/null
        echo
        echo "Ajustando permissões em /opt/airflow para ${AIRFLOW_UID}:0..."
        chown -v -R "${AIRFLOW_UID}:0" /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Inicialização concluída."
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"
    restart: on-failure

  # -------------------------------------------------------
  # Airflow 3.x: 'webserver' foi renomeado para 'api-server'.
  # O airflow-apiserver serve tanto a UI quanto a API REST.
  # Health check usa o endpoint /api/v2/version (Airflow 3).
  # -------------------------------------------------------
  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # -------------------------------------------------------
  # Airflow 3.x: dag-processor é um processo separado
  # responsável por ler e processar os arquivos de DAG.
  # -------------------------------------------------------
  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully


volumes:
  postgres-db-volume:
  airflow-logs:
