x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  image: economic-reports-airflow:latest

  env_file:
    - .env

  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    PYTHONPATH: /opt/airflow

  volumes:
    # Bind mounts para desenvolvimento iterativo (hot-reload sem rebuild)
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    # Volume nomeado para logs — Docker gerencia permissões automaticamente.
    # Evita o PermissionError causado por bind mounts com uid diferente do host.
    - airflow-logs:/opt/airflow/logs

  depends_on:
    postgres:
      condition: service_healthy

  # uid 50000 = usuário airflow padrão da imagem oficial
  user: "${AIRFLOW_UID:-50000}:0"


services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-init:
    <<: *airflow-common
    # Garante permissão no volume de logs antes de iniciar o DB.
    # O volume nomeado é criado pelo Docker, mas o subdiretório scheduler
    # precisa existir e ter permissão de escrita para o uid 50000.
    command:
      - bash
      - -c
      - |
        mkdir -p /opt/airflow/logs/scheduler &&
        airflow db migrate &&
        airflow users create -u admin -f Admin -l User -r Admin -e admin@example.com -p admin || true
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy

  webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully


volumes:
  postgres-db-volume:
  # Volume nomeado para logs: Docker cria com permissões corretas para uid 50000
  airflow-logs:
